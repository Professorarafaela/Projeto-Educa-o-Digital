<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empatia e Cooperação</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 90%;
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-content {
            padding: 30px 24px;
        }

        h1 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        p {
            font-size: 1rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            background-color: #5cb85c;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #4cae4c;
            box-shadow: 0 4px 12px rgba(92, 184, 92, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <img class="card-image" src="https://images.unsplash.com/photo-1517486808906-6ca8b3f04846?auto=format&fit=crop&q=80&w=600" alt="Pessoas unindo as mãos em sinal de cooperação">
        
        <div class="card-content">
            <h1>O Poder da Empatia e Cooperação</h1>
            
            <p>
                Grandes conquistas nunca são feitas de forma isolada. Quando nos colocamos no lugar do outro e unimos forças, transformamos desafios em pontes e criamos um impacto positivo real no mundo ao nosso redor.
            </p>
            
            <a href="#" class="btn">Fazer a Diferença</a>
        </div>
    </div>

</body>
</html>
